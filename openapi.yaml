openapi: 3.1.0
info:
  title: Ferrum Edge Admin API
  description: |
    RESTful API for managing the Ferrum Edge configuration at runtime.

    All endpoints except `/health`, `/status`, `/metrics`, `/charges`, and
    `/overload` require JWT bearer token authentication via the
    `Authorization: Bearer <token>` header.

    When the primary database is unavailable, read endpoints transparently fall
    back to the most recent cached configuration and include an
    `X-Data-Source: cached` response header. Write operations require a live
    database and return `503 Service Unavailable` when one is not present.

    The Admin API can be placed in **read-only mode**, in which case all POST,
    PUT, and DELETE operations return `403 Forbidden`.
  version: 0.1.0
  license:
    name: PolyForm Noncommercial 1.0.0
    url: https://polyformproject.org/licenses/noncommercial/1.0.0

servers:
  - url: "{protocol}://{host}:{port}"
    description: Admin API listener
    variables:
      protocol:
        default: http
        enum: [http, https]
      host:
        default: 127.0.0.1
      port:
        default: "9000"

security:
  - bearerAuth: []

tags:
  - name: Health
    description: Unauthenticated health and readiness probes
  - name: Metrics
    description: Observability and monitoring endpoints
  - name: Proxies
    description: Manage proxy route definitions
  - name: Consumers
    description: Manage API consumers and their credentials
  - name: Plugins
    description: Manage plugin configurations
  - name: Upstreams
    description: Manage upstream groups for load-balanced backends
  - name: Batch
    description: Bulk resource creation for high-throughput provisioning
  - name: Backup & Restore
    description: Full configuration backup and restore for disaster recovery and migration
  - name: Namespaces
    description: Multi-tenant namespace discovery

paths:
  # ── Health ──────────────────────────────────────────────────────────
  /health:
    get:
      operationId: getHealth
      summary: Gateway health check
      description: |
        Returns gateway health status including database connectivity and
        cached configuration availability. Also accessible at `/status`.
      tags: [Health]
      security: []
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /status:
    get:
      operationId: getStatus
      summary: Gateway status (alias for /health)
      tags: [Health]
      security: []
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ── Overload ────────────────────────────────────────────────────────
  /overload:
    get:
      operationId: getOverload
      summary: Overload status
      description: |
        Returns the gateway's current overload state including resource pressure
        metrics (file descriptors, connections, event loop latency) and active
        load-shedding actions. Unauthenticated so it can be used by load balancers
        and monitoring probes.

        Returns `503 Service Unavailable` when the overload level is `critical`.

        In control-plane mode (no proxy state), returns a minimal
        `{"level":"normal","message":"No proxy state available"}` response.
      tags: [Health]
      security: []
      responses:
        "200":
          description: Overload state (normal or pressure)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/OverloadSnapshot"
                  - $ref: "#/components/schemas/OverloadNoProxyState"
        "503":
          description: Overload state is critical — gateway is shedding load
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverloadSnapshot"

  # ── Metrics ─────────────────────────────────────────────────────────
  /metrics:
    get:
      operationId: getPrometheusMetrics
      summary: Prometheus metrics
      description: |
        Returns gateway metrics in Prometheus exposition format.
        Unauthenticated so it can be scraped by Prometheus without credentials.
      tags: [Metrics]
      security: []
      responses:
        "200":
          description: Prometheus text exposition
          content:
            text/plain:
              schema:
                type: [string, "null"]
              example: |
                # HELP ferrum_requests_total Total number of requests processed
                # TYPE ferrum_requests_total counter
                ferrum_requests_total{proxy_id="my-api",method="GET",status_code="200"} 42

  # ── Charges ────────────────────────────────────────────────────────
  /charges:
    get:
      operationId: getCharges
      summary: API chargeback data
      description: |
        Returns per-consumer API usage charges tracked by the `api_chargeback` plugin.
        Unauthenticated so it can be scraped by Prometheus without credentials.
        Default format is Prometheus text exposition; use `?format=json` for JSON.

        **Multi-node deployments**: Each gateway node accumulates charges independently.
        In CP/DP topologies, scrape every DP node and aggregate externally.
      tags: [Metrics]
      security: []
      parameters:
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [prometheus, json]
          description: |
            Output format. Default is Prometheus text exposition format.
            Use `json` for a structured JSON breakdown by consumer, proxy, and status code.
      responses:
        "200":
          description: Chargeback data
          content:
            text/plain:
              schema:
                type: [string, "null"]
              example: |
                # HELP ferrum_api_chargeable_calls_total Total chargeable API calls per consumer.
                # TYPE ferrum_api_chargeable_calls_total counter
                ferrum_api_chargeable_calls_total{consumer="alice",proxy_id="proxy-1",proxy_name="Payments API",status_code="200"} 150000
                # HELP ferrum_api_charges_total Total charges accumulated per consumer.
                # TYPE ferrum_api_charges_total counter
                ferrum_api_charges_total{consumer="alice",proxy_id="proxy-1",proxy_name="Payments API",status_code="200",currency="USD"} 1.5000000000
            application/json:
              schema:
                $ref: "#/components/schemas/ChargebackResponse"

  /admin/metrics:
    get:
      operationId: getAdminMetrics
      summary: Comprehensive gateway runtime metrics (JSON)
      description: |
        Returns a comprehensive snapshot of the gateway's runtime state including
        request throughput, connection pool sizes, circuit breaker states, health
        check results, load balancer active connections, cache statistics, consumer
        index breakdowns, and rate limiter tracked keys.

        The response is cached for 5 seconds to avoid performance impact from
        frequent polling. The `X-Cache` response header indicates `hit` or `miss`.

        Designed for dashboards and monitoring integrations that need richer data
        than the Prometheus `/metrics` endpoint provides.
      tags: [Metrics]
      responses:
        "200":
          description: Runtime metrics snapshot
          headers:
            X-Cache:
              schema:
                type: string
                enum: [hit, miss]
              description: Whether this response was served from the 5-second cache
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMetrics"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Batch ────────────────────────────────────────────────────────────
  /batch:
    post:
      operationId: batchCreate
      summary: Batch create resources
      description: |
        Creates multiple resources in a single request. Each resource type is
        persisted in a single database transaction, dramatically improving
        throughput compared to individual create calls.

        Resources are created in dependency order: consumers and upstreams
        first, then proxies, then plugin configs. This ensures referential
        integrity when plugins reference proxy IDs or consumer usernames.

        All fields within each resource follow the same schema as the
        individual create endpoints. IDs are auto-generated if omitted.
      tags: [Batch]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchCreateRequest"
      responses:
        "201":
          description: All resources created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateResponse"
        "207":
          description: Partial success — some resource types failed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BatchCreateResponse"
                  - type: object
                    properties:
                      errors:
                        type: array
                        items:
                          type: string
                        description: Error messages for failed resource types
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  # ── Backup & Restore ────────────────────────────────────────────────
  /backup:
    get:
      operationId: backupConfig
      summary: Export full gateway configuration
      description: |
        Returns the complete gateway configuration as a single JSON document
        suitable for archival or later restoration via `POST /restore`.

        The output format is compatible with `POST /batch` (additive import)
        and `POST /restore` (full replacement). Consumer credentials are
        included **unredacted** since this is a backup endpoint.

        Falls back to the in-memory cached configuration when the database is
        unavailable, indicated by the `X-Data-Source: cached` response header.

        ### Size guidance

        The response is a single JSON document containing all requested
        resources. Typical sizes:

        | Deployment | Resources | Approx size |
        |------------|-----------|-------------|
        | Small | ~100 proxies, ~50 consumers | 100–200 KB |
        | Medium | ~1,000 proxies, ~500 consumers | 1–2 MB |
        | Large | ~5,000 proxies, ~3,000 consumers | 5–10 MB |
        | Very large | 10,000+ proxies, 5,000+ consumers | 15+ MB |

        For very large deployments, use the `resources` query parameter to
        back up individual resource types separately.
      tags: [Backup & Restore]
      parameters:
        - name: resources
          in: query
          required: false
          description: |
            Comma-separated list of resource types to include.
            Valid values: `proxies`, `consumers`, `plugin_configs`, `upstreams`.
            When omitted, all resource types are included.
          schema:
            type: string
            example: "proxies,upstreams"
      responses:
        "200":
          description: Full configuration backup
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="ferrum-backup.json"'
            X-Data-Source:
              schema:
                type: string
                enum: [database, cached]
                description: Where the config was read from
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /restore:
    post:
      operationId: restoreConfig
      summary: Replace all configuration from a backup
      description: |
        **Destructive operation** — deletes ALL existing resources and imports
        the provided configuration. Requires `?confirm=true` query parameter
        to prevent accidental invocation.

        Accepts the same JSON format produced by `GET /backup`. Resources are
        imported in dependency order (consumers & upstreams first, then proxies,
        then plugin configs).

        To perform an additive (non-destructive) import, use `POST /batch`
        instead.

        ### Body size limit

        Default: **100 MiB** (supports ~30K proxies + 90K plugins).
        Configurable via the `FERRUM_ADMIN_RESTORE_MAX_BODY_SIZE_MIB`
        environment variable. Returns `413 Payload Too Large` when exceeded.

        Database inserts are chunked into 1,000-record transactions to keep
        WAL/redo size bounded. A 90K-plugin restore runs as 90 commits, not
        one massive transaction.

        For configurations exceeding the body limit, restore resource types
        separately using `POST /batch` with partial backup files
        (generated via `GET /backup?resources=proxies`, etc.).
      tags: [Backup & Restore]
      parameters:
        - name: confirm
          in: query
          required: true
          description: Must be `true` to confirm the destructive operation
          schema:
            type: boolean
            enum: [true]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestoreRequest"
      responses:
        "200":
          description: Configuration restored successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreResponse"
        "207":
          description: Partial success — some resource types failed during import
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/RestoreResponse"
                  - type: object
                    properties:
                      errors:
                        type: array
                        items:
                          type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "413":
          description: Request body too large (default max 100 MiB, configurable via FERRUM_ADMIN_RESTORE_MAX_BODY_SIZE_MIB)
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  # ── Proxies ─────────────────────────────────────────────────────────
  /proxies:
    get:
      operationId: listProxies
      summary: List all proxies
      description: |
        Falls back to cached config when the database is unavailable.

        When `limit` or `offset` query parameters are provided, the response
        is wrapped in a paginated envelope with `data` and `pagination` fields.
        Without pagination parameters, a plain JSON array is returned for
        backward compatibility.
      tags: [Proxies]
      parameters:
        - $ref: "#/components/parameters/PaginationOffset"
        - $ref: "#/components/parameters/PaginationLimit"
      responses:
        "200":
          description: Array of proxy objects
          headers:
            X-Data-Source:
              $ref: "#/components/headers/X-Data-Source"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Proxy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    post:
      operationId: createProxy
      summary: Create a proxy
      description: |
        Creates a new proxy route. A UUID is generated when `id` is omitted or
        empty. `created_at` and `updated_at` are set automatically.
      tags: [Proxies]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxyCreate"
      responses:
        "201":
          description: Proxy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proxy"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "409":
          description: Conflict — `listen_path` already exists, or stream proxy `listen_port` conflicts with another proxy, a gateway reserved port, or is not available on the host
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /proxies/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"

    get:
      operationId: getProxy
      summary: Get a proxy
      tags: [Proxies]
      responses:
        "200":
          description: Proxy object
          headers:
            X-Data-Source:
              $ref: "#/components/headers/X-Data-Source"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proxy"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    put:
      operationId: updateProxy
      summary: Update a proxy
      description: |
        Replaces the proxy with the given body. The `id` field in the body is
        ignored — the path parameter is authoritative. `updated_at` is set
        automatically.
      tags: [Proxies]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxyCreate"
      responses:
        "200":
          description: Proxy updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proxy"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "409":
          description: Conflict — `listen_path` already exists on another proxy, or stream proxy `listen_port` conflicts with another proxy, a gateway reserved port, or is not available on the host
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    delete:
      operationId: deleteProxy
      summary: Delete a proxy
      tags: [Proxies]
      responses:
        "204":
          description: Proxy deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  # ── Consumers ───────────────────────────────────────────────────────
  /consumers:
    get:
      operationId: listConsumers
      summary: List all consumers
      description: |
        When `limit` or `offset` query parameters are provided, the response
        is wrapped in a paginated envelope. Without them, a plain JSON array
        is returned for backward compatibility.
      tags: [Consumers]
      parameters:
        - $ref: "#/components/parameters/PaginationOffset"
        - $ref: "#/components/parameters/PaginationLimit"
      responses:
        "200":
          description: Array of consumer objects
          headers:
            X-Data-Source:
              $ref: "#/components/headers/X-Data-Source"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Consumer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    post:
      operationId: createConsumer
      summary: Create a consumer
      description: |
        Creates a new API consumer. A UUID is generated when `id` is omitted
        or empty. Plaintext `password` fields inside `basicauth` credentials
        are automatically bcrypt-hashed and stored as `password_hash`.
      tags: [Consumers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsumerCreate"
      responses:
        "201":
          description: Consumer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consumer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /consumers/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"

    get:
      operationId: getConsumer
      summary: Get a consumer
      tags: [Consumers]
      responses:
        "200":
          description: Consumer object
          headers:
            X-Data-Source:
              $ref: "#/components/headers/X-Data-Source"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consumer"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    put:
      operationId: updateConsumer
      summary: Update a consumer
      tags: [Consumers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsumerCreate"
      responses:
        "200":
          description: Consumer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consumer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    delete:
      operationId: deleteConsumer
      summary: Delete a consumer
      tags: [Consumers]
      responses:
        "204":
          description: Consumer deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ReadOnly"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /consumers/{consumer_id}/credentials/{cred_type}:
    parameters:
      - name: consumer_id
        in: path
        required: true
        schema:
          type: [string, "null"]
        description: Consumer ID
      - name: cred_type
        in: path
        required: true
        schema:
          type: [string, "null"]
          examples:
            - basicauth
            - key-auth
            - jwt
            - hmac_auth
            - mtls_auth
        description: |
          Credential type to set or remove (e.g. `basicauth`, `key-auth`,
          `jwt`, `hmac_auth`, `mtls_auth`).

    put:
      operationId: updateConsumerCredentials
      summary: Replace all credentials of a type
      description: |
        Replaces the entire credential value for the given type. Accepts a single
        JSON object or an array of objects. For `basicauth`, plaintext `password`
        fields are automatically hashed and stored as `password_hash`.
      tags: [Consumers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Credential payload (schema varies by credential type)
              examples:
                - username: alice
                  password: s3cret
                - key: my-api-key-value
      responses:
        "200":
          description: Credentials updated — returns full consumer object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consumer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    post:
      operationId: appendConsumerCredential
      summary: Append a credential entry for rotation
      description: |
        Appends a new credential entry to the given type, enabling zero-downtime
        credential rotation. If the existing credential is a single object, it is
        converted to an array. Max entries per type is controlled by
        `FERRUM_MAX_CREDENTIALS_PER_TYPE` (default: 2). For `basicauth`, plaintext
        `password` fields are automatically hashed.
      tags: [Consumers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Single credential entry to append (must be a JSON object)
      responses:
        "200":
          description: Credential appended — returns full consumer object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consumer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

    delete:
      operationId: deleteConsumerCredentials
      summary: Remove all credentials of a type
      tags: [Consumers]
      responses:
        "204":
          description: Credential removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /consumers/{consumer_id}/credentials/{cred_type}/{index}:
    parameters:
      - $ref: "#/components/parameters/ConsumerId"
      - name: cred_type
        in: path
        required: true
        schema:
          type: string
        description: Credential type (e.g. `keyauth`, `jwt`, `basicauth`).
      - name: index
        in: path
        required: true
        schema:
          type: integer
          minimum: 0
        description: Zero-based index of the credential entry to remove.
    delete:
      operationId: deleteConsumerCredentialByIndex
      summary: Remove a specific credential entry by index
      description: |
        Removes a single credential entry at the given index. When the array has
        one remaining element after removal, it is collapsed back to a single
        object. When a single-object credential exists, only index 0 is valid.
      tags: [Consumers]
      responses:
        "200":
          description: Credential entry removed — returns full consumer object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consumer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  # ── Plugins ─────────────────────────────────────────────────────────
  /plugins:
    get:
      operationId: listAvailablePlugins
      summary: List available plugin types
      description: Returns the names of all built-in plugins that can be configured.
      tags: [Plugins]
      responses:
        "200":
          description: Array of plugin type names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: [string, "null"]
              example:
                - stdout_logging
                - statsd_logging
                - http_logging
                - tcp_logging
                - kafka_logging
                - ws_logging
                - transaction_debugger
                - jwks_auth
                - jwt_auth
                - key_auth
                - basic_auth
                - hmac_auth
                - mtls_auth
                - cors
                - access_control
                - tcp_connection_throttle
                - ip_restriction
                - bot_detection
                - correlation_id
                - request_transformer
                - response_transformer
                - compression
                - graphql
                - grpc_method_router
                - grpc_deadline
                - grpc_web
                - rate_limiting
                - request_size_limiting
                - response_size_limiting
                - body_validator
                - request_termination
                - response_mock
                - response_caching
                - prometheus_metrics
                - otel_tracing
                - ai_token_metrics
                - ai_request_guard
                - ai_rate_limiter
                - ai_prompt_shield
                - sse
                - request_mirror
                - load_testing
                - ws_message_size_limiting
                - ws_frame_logging
                - ws_logging
                - ws_rate_limiting
                - udp_rate_limiting
                - udp_logging
                - loki_logging
                - ldap_auth
                - serverless_function
                - soap_ws_security
