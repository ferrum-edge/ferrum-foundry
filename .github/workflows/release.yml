name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

  docker:
    name: Docker (${{ matrix.platform }})
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch_dir: amd64
          - platform: linux/arm64
            arch_dir: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR_MINOR="${VERSION%.*}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major_minor=$MAJOR_MINOR" >> $GITHUB_OUTPUT

      - name: Build and push per-platform digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,"name=ferrumedge/ferrum-foundry,ghcr.io/${{ github.repository }}",push-by-digest=true,name-canonical=true,push=true
          provenance: false
          cache-from: type=gha,scope=${{ matrix.arch_dir }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch_dir }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: docker-digest-${{ matrix.arch_dir }}
          path: /tmp/digests/*
          if-no-files-found: error

  docker-manifest:
    name: Docker Manifest
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: docker-digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR_MINOR="${VERSION%.*}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major_minor=$MAJOR_MINOR" >> $GITHUB_OUTPUT

      - name: Create and push multi-arch manifest (Docker Hub)
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ferrumedge/ferrum-foundry:${{ github.ref_name }} \
            -t ferrumedge/ferrum-foundry:${{ steps.version.outputs.version }} \
            -t ferrumedge/ferrum-foundry:${{ steps.version.outputs.major_minor }} \
            $(printf 'ferrumedge/ferrum-foundry@sha256:%s ' *)

      - name: Create and push multi-arch manifest (GHCR)
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:${{ github.ref_name }} \
            -t ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }} \
            -t ghcr.io/${{ github.repository }}:${{ steps.version.outputs.major_minor }} \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)

  create-release:
    name: Create GitHub Release
    needs: [docker-manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > notes.md << 'NOTES'
          ## Ferrum Foundry ${{ github.ref_name }}

          ### Docker

          ```bash
          docker pull ferrumedge/ferrum-foundry:${{ github.ref_name }}
          docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          ```

          ### Quick Start

          ```bash
          docker run \
            -e FERRUM_ADMIN_URL=http://your-gateway:9000 \
            -e FERRUM_JWT_SECRET=your-secret \
            -p 8080:8080 \
            ferrumedge/ferrum-foundry:${{ github.ref_name }}
          ```
          NOTES

          gh release create "${{ github.ref_name }}" \
            --title "Ferrum Foundry ${{ github.ref_name }}" \
            --notes-file notes.md
